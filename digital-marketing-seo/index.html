  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));

    d.id = '__bundler_err';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

            const reader = ds.readable.getReader();

            (entry.compressed ? toBase64(finalBytes) : entry.data);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};

      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

:999px;font-weight:700;font-size:14px;font-family:'Sora',sans-serif;margin-top:16px\">Chat now →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid #E2E9F1;margin-top:36px;padding-top:24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:13px;color:#AAB2BB\">\n      <span>© 2026 Future Vision Computers. All rights reserved.<\u002Fspan>\n      <span>Rated 4.9 ★ on Google · 3 branches across Surat<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    quizStep: 0,\n    quizScores: {},\n    seoInput: '', seoKeyword: '', seoState: 'idle', seoScore: 0,\n    botInput: '', botMsgs: [\n      { from:'bot', text:\"Hi! 👋 I'm the Future Vision auto-reply bot — a live demo of the automations you'll build in Module 3.\\n\\nAsk me about fees, duration, placements or batches!\" }\n    ], botTyping: false,\n    openMods: { 1:true }, openFaq: { 0:true }\n  };\n\n  // ---------- QUIZ ----------\n  quizData = [\n    { q: 'What kind of work excites you most?', opts: [\n      { label:'Creating visuals, reels & content', icon:'🎨', tag:'creative' },\n      { label:'Numbers, targeting & ad budgets', icon:'📊', tag:'performance' },\n      { label:'Automating & building systems', icon:'⚙️', tag:'automation' } ] },\n    { q: 'Pick a task you\\u2019d enjoy on a Monday:', opts: [\n      { label:'Designing a landing page that ranks', icon:'🔍', tag:'seo' },\n      { label:'Launching a Meta ad campaign', icon:'🚀', tag:'performance' },\n      { label:'Wiring a WhatsApp chatbot funnel', icon:'🤖', tag:'automation' } ] },\n    { q: 'Your ideal outcome after 6 months?', opts: [\n      { label:'Freelance / run my own agency', icon:'💼', tag:'creative' },\n      { label:'Land a high-paying marketing job', icon:'📈', tag:'performance' },\n      { label:'Automate my own business', icon:'🏭', tag:'automation' } ] }\n  ];\n  quizResults = {\n    performance: { role:'Performance Marketer', blurb:'You love data and results. Running Google & Meta campaigns that turn budgets into revenue is your zone.', mods:['Google Ads','Meta Ads','Conversion Tracking','Ad Intelligence'] },\n    seo: { role:'SEO & Web Specialist', blurb:'You like building things that compound. Ranking sites and owning organic traffic is a superpower.', mods:['On-Page SEO','Technical SEO','Content Writing','AEO'] },\n    creative: { role:'Social Media Manager', blurb:'You think in stories and visuals. Building brands across social with AI-assisted creative is your lane.', mods:['Social with AI','Canva Mastery','Reels & Carousels','Personal Branding'] },\n    automation: { role:'AI Automation Specialist', blurb:'You want leverage. Building agentic AI systems and chatbots that run funnels 24/7 is the future.', mods:['Agentic AI','Chatbot Automation','Multi-Agent Funnels','CRM Pipelines'] }\n  };\n  pickQuiz(tag){\n    this.setState(s => {\n      const sc = { ...s.quizScores }; sc[tag] = (sc[tag]||0)+1;\n      return { quizScores: sc, quizStep: s.quizStep + 1 };\n    });\n  }\n  quizWinner(){\n    const sc = this.state.quizScores; let best=null, n=-1;\n    for(const k in sc){ if(sc[k]>n){n=sc[k];best=k;} }\n    return this.quizResults[best] || this.quizResults.performance;\n  }\n\n  // ---------- SEO ----------\n  hash(str){ let h=0; for(let i=0;i<str.length;i++){h=(h*31+str.charCodeAt(i))>>>0;} return h; }\n  seoRun(){\n    const kw = this.state.seoInput.trim() || 'digital marketing course';\n    this.setState({ seoState:'scanning', seoKeyword: kw });\n    if(this._seoT) clearTimeout(this._seoT);\n    this._seoT = setTimeout(()=>{\n      const h = this.hash(kw.toLowerCase());\n      const score = 48 + (h % 46); // 48-93\n      this.setState({ seoState:'result', seoScore: score });\n    }, 1500);\n  }\n  seoMetricsFor(){\n    const kw = this.state.seoKeyword.toLowerCase(); const h=this.hash(kw);\n    const diff = 20 + (h % 70);\n    const vol = 300 + (h % 90) * 140;\n    const cpc = (0.4 + (h%40)/10).toFixed(1);\n    const intent = 55 + (h%42);\n    const col = v => v>70? '#28C840' : v>45? '#FEBC2E' : '#FF5F57';\n    return [\n      { label:'Keyword difficulty', val:diff, width:diff+'%', color: diff<45?'#28C840':diff<70?'#FEBC2E':'#FF5F57' },\n      { label:'Est. monthly volume', val:(vol>1000?(vol/1000).toFixed(1)+'k':vol), width: Math.min(100,vol/60)+'%', color:'#4E9BFF' },\n      { label:'Avg. CPC ($)', val:cpc, width: Math.min(100,cpc*18)+'%', color:'#B57BFF' },\n      { label:'Buyer intent', val:intent, width:intent+'%', color: col(intent) }\n    ];\n  }\n\n  // ---------- BOT ----------\n  botReplyFor(txt){\n    const t = txt.toLowerCase();\n    if(/(fee|price|cost|charge|payment|emi)/.test(t)) return \"The program is offered at an early-bird price for the next batch, with EMI options available. 💳\\n\\nTap 'Enroll now' or message us on WhatsApp (8799 141 678) for the current fee & offers!\";\n    if(/(duration|how long|month|time|week)/.test(t)) return \"It's a 6-month (24-week) offline program — 180+ learning hours, 100% practical, with 20+ AI & marketing tools. 📅\";\n    if(/(job|placement|salary|career|hire|package)/.test(t)) return \"We offer 1-on-1 career coaching, resume & LinkedIn optimization, and our alumni work as marketers, managers & agency owners. Avg. DM Manager salary in India is ~₹13 LPA. 📈\";\n    if(/(location|branch|address|where|surat)/.test(t)) return \"We have 3 branches in Surat — Citylight, Vesu & Pal. It's an offline, hands-on program. 📍\";\n    if(/(demo|trial|visit|free)/.test(t)) return \"Absolutely! Message us on WhatsApp (8799 141 678) and we'll set up a free demo/counselling session for you. 🙌\";\n    if(/(what|learn|curriculum|module|syllabus|content)/.test(t)) return \"3 modules: 1) Digital Marketing with AI (Google & Meta Ads), 2) Website Designing & SEO, 3) Agentic AI & Automation — with 10 live capstone projects. 🚀\";\n    if(/(hi|hello|hey|namaste)/.test(t)) return \"Hey there! 👋 Happy to help. Ask me about fees, duration, curriculum, placements or batches!\";\n    return \"Great question! For a detailed answer, tap 'Enroll now' or ping us on WhatsApp (8799 141 678) — our team replies fast. 😊 Meanwhile, ask me about fees, duration, curriculum or placements!\";\n  }\n  botPush(from, text){ this.setState(s => ({ botMsgs: [...s.botMsgs, { from, text }] })); this.scrollChat(); }\n  scrollChat(){ setTimeout(()=>{ const el=document.getElementById('fv-chat'); if(el) el.scrollTop=el.scrollHeight; },40); }\n  botSubmit(text){\n    const msg = (text!==undefined? text : this.state.botInput).trim();\n    if(!msg) return;\n    this.botPush('user', msg);\n    this.setState({ botInput:'', botTyping:true });\n    if(this._botT) clearTimeout(this._botT);\n    this._botT = setTimeout(()=>{\n      this.setState({ botTyping:false });\n      this.botPush('bot', this.botReplyFor(msg));\n    }, 1100);\n  }\n\n  toggleMod(n){ this.setState(s => ({ openMods: { ...s.openMods, [n]: !s.openMods[n] } })); }\n  toggleFaq(i){ this.setState(s => ({ openFaq: { ...s.openFaq, [i]: !s.openFaq[i] } })); }\n\n  renderVals(){\n    const st = this.state;\n    // QUIZ\n    const asking = st.quizStep < this.quizData.length;\n    const cur = this.quizData[st.quizStep] || this.quizData[0];\n    const win = asking ? null : this.quizWinner();\n    // SEO\n    const dash = st.seoState==='result' ? `${(st.seoScore/100*100).toFixed(0)}, 100` : '0, 100';\n    const scoreColor = st.seoScore>75?'#28C840':st.seoScore>60?'#FEBC2E':'#4E9BFF';\n\n    // MODULES\n    const moduleDefs = [\n      { num:'01', icon:'🚀', title:'Digital Marketing Foundations with AI', subtitle:'The core skills every marketer must own, supercharged with AI.', meta:'6 weeks · 8 topics', capstone:'A full go-to-market plan for a real brand',\n        topics:[\n          { icon:'🧭', name:'Marke
